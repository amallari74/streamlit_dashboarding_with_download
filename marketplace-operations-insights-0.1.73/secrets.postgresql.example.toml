# Example secrets.toml for PostgreSQL Read Replica Setup
# Copy this to .streamlit/secrets.toml and update with your credentials

# PostgreSQL Read Replica (PREFERRED) - Will be used automatically when available
[connections.postgresql]
type = "sql"
url = "postgresql://username:password@read-replica-host:5432/database_name?sslmode=require"

# Redshift (FALLBACK) - Used when PostgreSQL is not available
[connections.redshift]
type = "sql"
url = "redshift+redshift_connector://username:password@redshift-host:5439/pax8dw?sslmode=prefer"

# Application Authentication
[auth]
app_password = "your_secure_app_password"

# Auth0 Configuration (for user authentication)
[auth0]
enabled = true
domain = "p8p-production.us.auth0.com"
client_id = "your_auth0_client_id"
client_secret = "your_auth0_client_secret"
callback_url = "http://localhost:8501/"
audience = "https://p8p-production.us.auth0.com/userinfo"
cookie_secret = "generate_a_random_alphanumeric_string_here"

# Jira Integration (for ticket creation features)
[jira]
username = "your_jira_username"
password = "your_jira_api_token"
url = "https://your-instance.atlassian.net"

# Example PostgreSQL URLs for different environments:
# 
# AWS RDS Read Replica:
# postgresql://readonly_user:password@prod-replica.region.rds.amazonaws.com:5432/pax8dw?sslmode=require
#
# Google Cloud SQL Read Replica:
# postgresql://readonly_user:password@replica-ip:5432/pax8dw?sslmode=require
#
# Azure Database Read Replica:  
# postgresql://readonly_user:password@server.postgres.database.azure.com:5432/pax8dw?sslmode=require
#
# Local PostgreSQL:
# postgresql://username:password@localhost:5432/pax8dw

# Security Notes:
# 1. Use read-only database user for safety
# 2. Always use SSL connections (sslmode=require)
# 3. Store this file securely and never commit to version control
# 4. Use strong passwords for all services
# 5. Rotate credentials regularly
